name: deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic_checks:
    name: basic_checks
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun_version
      - name: install dependencies
        run: make install
      - name: run ci_checks
        run: make ci_checks

  docker_checks:
    needs: basic_checks
    name: docker_checks_(${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner: [
          ubuntu-latest,
          ubuntu-24.04-arm,
          macos-latest,
          macos-13 ]

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4

      - name: build images
        run: make -C deployment docker_build

      - name: test images
        run: make -C deployment docker_test

name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic_checks:
    name: basic_checks
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: install dependencies
        run: make install
      - name: run ci_checks
        run: make ci_checks

  executables_smoke_checks:
    needs: basic_checks
    name: executables_smoke_checks_(${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner: [
          ubuntu-latest,
          ubuntu-24.04-arm,
          macos-latest,
          macos-15-intel ]

    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"

      - name: install dependencies
        run: make install

      - name: build runner binaries
        run: deployment/runners_build.sh

      - name: smoke test runner binaries
        run: |
          for binary in dist/litevolve_*; do
            [ -f "$binary" ] || continue
            deployment/smoke_test.sh "$(basename "$binary")" "$binary" "$PWD/migrations"
          done

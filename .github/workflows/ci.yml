name: checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: install dependencies
        run: bun install
        working-directory: runtimes/bun
      - name: lint
        run: scripts/ci_lint.sh
      - name: core align
        run: scripts/ci_check_align.sh

  check_bun:
    name: check_bun
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: install dependencies
        run: bun install
        working-directory: runtimes/bun
      - name: check bun version
        run: scripts/ci_check_bun_version.sh
      - name: check dependency updates
        run: scripts/ci_check_updates_bun.sh
      - name: build
        run: scripts/ci_build.sh bun
      - name: type check
        run: scripts/ci_types.sh bun
      - name: security audit
        run: scripts/ci_sec.sh bun
      - name: test
        run: scripts/ci_test.sh bun

  check_node:
    name: check_node
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: install node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: ".node-version"
      - name: install dependencies
        run: npm install
        working-directory: runtimes/node
      - name: check node version
        run: scripts/ci_check_node_version.sh
      - name: check dependency updates
        run: scripts/ci_check_updates_node.sh
      - name: build
        run: scripts/ci_build.sh node
      - name: type check
        run: scripts/ci_types.sh node
      - name: security audit
        run: scripts/ci_sec.sh node
      - name: test
        run: scripts/ci_test.sh node

  check_deno:
    name: check_deno
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: install deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: ".deno-version"
      - name: install dependencies
        run: deno install
        working-directory: runtimes/deno
      - name: check deno version
        run: scripts/ci_check_deno_version.sh
      - name: check dependency updates
        run: scripts/ci_check_updates_deno.sh
      - name: build
        run: scripts/ci_build.sh deno
      - name: type check
        run: scripts/ci_types.sh deno
      - name: security audit
        run: scripts/ci_sec.sh deno
      - name: test
        run: scripts/ci_test.sh deno

  executables_smoke_checks:
    needs: [check_bun, check_node, check_deno]
    name: executables_smoke_checks_(${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner: [
          ubuntu-latest,
          ubuntu-24.04-arm,
          macos-latest,
          macos-15-intel ]

    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"

      - name: install dependencies
        run: bun install

      - name: build runner binaries
        run: scripts/runners_build.sh

      - name: smoke test runner binaries
        run: |
          for binary in dist/litevolve_*; do
            [ -f "$binary" ] || continue
            scripts/smoke_test.sh "$(basename "$binary")" "$binary" "$PWD/migrations"
          done
